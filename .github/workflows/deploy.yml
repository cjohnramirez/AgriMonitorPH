name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install and Test
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile --ignore-workspace
          pnpm test

      - name: Deploy to Vercel
        # We run from the root but tell the CLI specifically where the project lives
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --local-config ./frontend/.vercel/project.json --cwd ./frontend
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd ./frontend
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
