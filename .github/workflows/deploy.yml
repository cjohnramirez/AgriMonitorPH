name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    # This locks EVERY step below into the frontend folder automatically
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install and Test
        run: |
          pnpm install --no-frozen-lockfile
          pnpm test

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          # 1. Pull the cloud settings down to the local runner
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          # 2. Upload the source code and build on Vercel's servers
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
